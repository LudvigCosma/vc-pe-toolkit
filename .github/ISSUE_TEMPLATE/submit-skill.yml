name: "\U0001F680 Submit New Skill"
description: Submit a new skill to be featured in the VC/PE Toolkit
title: "[Skill]: "
labels: ["skill-submission", "pending-review"]

body:
  - type: markdown
    attributes:
      value: |
        ## Welcome!

        Thank you for submitting a skill to the VC/PE Toolkit. This form will guide you through the process.

        **Guidelines:**
        - Ensure your skill is unique and provides genuine value to PE/VC professionals.
        - Only the original author may submit — this helps us verify authenticity.
        - Submissions are reviewed for quality and security before listing.

  - type: input
    id: author_name
    attributes:
      label: Author Name
      description: "Your name, alias, or GitHub username"
      placeholder: "Jane Doe or janedoe"
    validations:
      required: true

  - type: input
    id: author_link
    attributes:
      label: Author Link
      description: "Link to your GitHub, LinkedIn, or personal website"
      placeholder: "https://github.com/janedoe"
    validations:
      required: true

  - type: input
    id: skill_name
    attributes:
      label: Skill Name
      description: The name of the skill as it will appear in the list
      placeholder: "e.g., lpa-term-extractor"
    validations:
      required: true

  - type: textarea
    id: skill_file
    attributes:
      label: Skill File
      description: "Drag and drop your SKILL.md file here (or a .zip of the skill folder)"
      placeholder: "Drag your file here..."
    validations:
      required: true

  - type: textarea
    id: skill_description
    attributes:
      label: Description
      description: "A brief description of your skill (1-3 sentences). Be descriptive, not promotional."
      placeholder: "Describe what your skill does, what inputs it expects, and what the user gets back..."
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: "Where does this skill sit in the investment lifecycle?"
      options:
        - "Sourcing & Screening"
        - "Due Diligence"
        - "Deal Execution"
        - "Portfolio Monitoring"
        - "Fundraising & IR"
        - "Back Office"
        - "Legal"
        - "Meta Skills"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Primary Platform
      description: "Which platform was this skill built and tested on?"
      options:
        - "Claude (Anthropic)"
        - "OpenAI / ChatGPT"
        - "Gemini (Google)"
        - "Platform-agnostic"
        - "Other"
    validations:
      required: true

  - type: dropdown
    id: license
    attributes:
      label: License
      description: Select the license for your skill
      options:
        - MIT
        - Apache-2.0
        - CC-BY-4.0
        - CC-BY-SA-4.0
        - CC-BY-NC-4.0
        - All Rights Reserved
        - Other (specify below)
    validations:
      required: true

  - type: input
    id: license_other
    attributes:
      label: Other License
      description: If you selected "Other" above, please specify
      placeholder: "e.g., BSD-2-Clause, Proprietary"
    validations:
      required: false

  - type: textarea
    id: additional_comments
    attributes:
      label: Additional Comments
      description: "Optional — any additional context, special features, or acknowledgments"
      placeholder: "e.g., context about why you created this, known limitations, etc."
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      description: Please confirm the following
      options:
        - label: "I have checked that this skill hasn't already been submitted"
          required: true
        - label: "My skill provides genuine value and any limitations are clearly stated"
          required: true
        - label: "No proprietary or sensitive data is included — only synthetic or anonymized examples"
          required: true
        - label: "I am submitting only ONE skill in this form"
          required: true
        - label: "I understand that submissions are reviewed and may be rejected"
          required: true

  - type: markdown
    attributes:
      value: |
        ## What happens next?

        1. **Review**: A maintainer will review your submission
        2. **Result**: If approved, your skill will be added to the toolkit. Either way, we'll update you in the comments.

        Thank you for contributing!
